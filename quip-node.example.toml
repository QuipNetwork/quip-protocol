[global]
node_name = "Quantum Node Name"  # Optional human-readable name for your node.

# Local binding address (ip address) and port to listen to.
listen = "0.0.0.0"
port = 20049 # ("QN" -> little endian unsigned int is 0x514E -> 0x4E51 = 20049)

# public_host = "my.dns.or.ip"
# public_port = 20049  # Defaults to port if not set

# Optional deterministic key generation
# Defaults to generate a brand new key on boot.
secret = "your-secret-here" # Used to generate a deterministic key pair for this node

# Enable mining on startup when no peers can be found.
# Defaults to exit if a peer cannot be found.
# auto_mine = true

# Genesis block configuration file path
# Defaults to "genesis_block.json" if not specified
genesis_config = "genesis_block.json"

# Peers to try and connect to (defaults shown below)
# peer = ["qpu-1.nodes.quip.network:20049", "cpu-1.quip.carback.us:20049", "gpu-1.quip.carback.us:20049", "gpu-2.quip.carback.us:20050", "nodes.quip.network:20049"]

timeout = 3  # Timeout for peer connections and communications in seconds
heartbeat_interval = 15  # Interval for sending heartbeats to peers in seconds
heartbeat_timeout = 300  # Timeout for waiting for heartbeats from peers in seconds
# Number of peers to gossip to at a time. Defaults to 3, you should never need to change this.
# fanout = 3

# TLS Configuration
verify_tls = false  # Verify TLS certificates when connecting to peers
# ca_bundle = "/path/to/ca-certificates.crt"  # Custom CA certificate bundle (optional)

# TLS certificates — shared by QUIC and REST (certbot manages these in Docker)
# tls_cert_file = "/data/certs/private/fullchain.pem"
# tls_key_file = "/data/certs/private/privkey.pem"
# rest_tls_cert_file = "..."  # Optional REST-only override
# rest_tls_key_file = "..."   # Optional REST-only override

# TOFU (Trust On First Use) - Certificate pinning for peer-to-peer security
tofu = true
trust_db = "~/.quip/trust.db"

# REST API (enabled when rest_port > 0 or rest_insecure_port > 0)
rest_host = "127.0.0.1"
rest_port = -1              # HTTPS port, -1 = disabled
rest_insecure_port = 20050  # HTTP port
# webroot = "/data/webroot"  # Static file dir (serves /.well-known/ for ACME challenges)

# Logging configuration
log_level = "INFO"  # DEBUG, INFO, WARNING, ERROR
node_log = "logs/quip-node.log"  # Path to main node log file (optional, defaults to stderr)
http_log = "logs/quip-node-http.log"  # Path to HTTP/aiohttp log file (optional, suppresses aiohttp logs if not set)

# Telemetry - local JSON output for monitoring
telemetry_enabled = true   # Write telemetry files (nodes.json, per-block stats)
telemetry_dir = "telemetry"  # Directory for telemetry output

# Telemetry stream API - exposes telemetry data via REST + QUIC for indexers
[telemetry_api]
# enabled = true                  # Defaults to telemetry_enabled value
# access_token = ""               # Bearer token for REST auth (empty = open access)
# rate_limit_rpm = 60             # Requests per minute per IP (burst floor = 10)
# max_sse_connections = 20        # Max concurrent SSE connections
# cache_refresh_interval = 5.0    # Seconds between telemetry dir scans

# if any of the following are defined then they will be spun up as miner processes to mine blocks.
# By default a single CPU miner is created.

[cpu]
# Limit CPU worker threads; max is number of logical CPUs on your system
num_cpus = 4

[gpu]
# Global GPU defaults — inherited by all GPU device sections below.
# utilization = 100  # 1-100, percentage of SMs to use
# yielding = false   # true = yield to other GPU users
# enabled = true     # false = skip this device

# Discovery commands:
#   CUDA:  nvidia-smi --query-gpu=index,name --format=csv,noheader
#   Metal: system_profiler SPDisplaysDataType | grep 'Chipset Model'

# ── CUDA / NVIDIA GPUs ──
# [cuda.N] or [nvidia.N] — one section per device ordinal.
# [nvidia.N] is an alias for [cuda.N].

[cuda.0]
# inherits [gpu] defaults

[cuda.1]
# utilization = 50
# yielding = true

# ── Apple Silicon (Metal) ──
# [metal]

# ── Modal cloud GPU ──
# [modal]
# gpu_type = "a10g"

# ── QPU Configuration ──

[qpu]
# Global QPU defaults — inherited by all QPU device sections below.
#
# QPU Time Budget Management
# Controls QPU usage to prevent exceeding your Leap allocation.
# Daily budget with proportional pacing — spreads usage across the day.
# Example: With 20 minutes/month, set daily budget to ~40s (20m / 30 days)
# Supports: 30s, 5m, 2h, etc.

# ── D-Wave ──
[dwave]
daily_budget = "60s"

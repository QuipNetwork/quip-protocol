[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quip-protocol"
version = "0.0.1"
description = "Quantum Proof-of-Work Blockchain Implementation"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "dwave-ocean-sdk>=6.0.0",
    "numpy>=1.24.0",
    "matplotlib>=3.6.0",
    "pandas>=2.0.0",
    "seaborn>=0.12.0",
    "python-dotenv>=1.0.0",
    "aiohttp>=3.9.0",
    "click>=8.1.7",
    "tomli>=2.0.1; python_version<'3.11'",
    "hashsigs>=0.0.2",
    "blake3>=1.0.5",
    "torch>=2.0.0",
    "torchvision>=0.15.0",
    "torchaudio>=2.0.0",
    "cupy-cuda12x>=12.0.0"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4,<9"
]

[project.scripts]
quip-demo = "quantum_blockchain:main"
quip-p2p = "quantum_blockchain_p2p:main"
quip-cpu-miner = "CPU.cpu_miner:cli"
quip-gpu-miner = "GPU.gpu_miner:run_with_modal"
quip-qpu-miner = "QPU.qpu_miner:cli"
quip-launch = "launch_network:main"
quip-network-node = "quip_cli:network_node_main"
quip-network-simulator = "quip_cli:network_simulator_main"

[tool.setuptools.packages.find]
include = ["shared*", "dwave*", "CPU*", "GPU*", "QPU*"]

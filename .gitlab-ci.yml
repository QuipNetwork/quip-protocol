# GitLab CI/CD for Quip Network Node Docker Images
# Builds multi-arch (amd64 + arm64) Docker images and PyInstaller binaries

stages:
  - build
  - package
  - release

variables:
  CPU_IMAGE: quip-network-node-cpu
  CUDA_IMAGE: quip-network-node-cuda

# Template for Docker image builds using Kaniko
# No Docker daemon required — builds and pushes from within a container
.docker_build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags: [linux, amd64]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n ${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD} | base64)\"}}}" > /kaniko/.docker/config.json
  only:
    - main
    - tags
    - /^v\d+/

build-cpu:
  extends: .docker_build
  script:
    - /kaniko/executor
        --context $CI_PROJECT_DIR
        --dockerfile docker/Dockerfile.cpu
        --destination $CI_REGISTRY_IMAGE/$CPU_IMAGE:$CI_COMMIT_SHA
        --destination $CI_REGISTRY_IMAGE/$CPU_IMAGE:latest

build-cuda:
  extends: .docker_build
  script:
    - /kaniko/executor
        --context $CI_PROJECT_DIR
        --dockerfile docker/Dockerfile.cuda
        --destination $CI_REGISTRY_IMAGE/$CUDA_IMAGE:$CI_COMMIT_SHA
        --destination $CI_REGISTRY_IMAGE/$CUDA_IMAGE:latest

# ---------------------------------------------------------------------------
# PyInstaller native binaries (package stage, tags only)
# ---------------------------------------------------------------------------

# Template for PyInstaller builds
# Binaries uploaded to GitLab Package Registry (no artifact size limit)
.pyinstaller_build:
  stage: build
  variables:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
    PACKAGE_NAME: quip-network-node
    PACKAGE_VERSION: "${CI_COMMIT_TAG:-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}}"
  script:
    - bash pyinstaller/build.sh
  after_script:
    - |
      for f in dist/quip-network-node-*; do
        filename=$(basename "$f")
        echo "Uploading $filename to Package Registry..."
        curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
             --upload-file "$f" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${PACKAGE_VERSION}/${filename}"
      done
  only:
    - tags
    - /^v\d+/

package-macos-arm64:
  extends: .pyinstaller_build
  tags: [macos, arm64]
  before_script:
    - /opt/homebrew/bin/python3 -m venv .venv
    - source .venv/bin/activate
    - pip install -U pip setuptools wheel
    - pip install pyinstaller
    - pip install -e ".[metal]"

package-macos-x86_64:
  extends: .pyinstaller_build
  tags: [macos, x86_64]
  before_script:
    - /opt/homebrew/bin/python3 -m venv .venv
    - source .venv/bin/activate
    - pip install -U pip setuptools wheel
    - pip install pyinstaller
    - pip install -e .

package-linux-x86_64:
  extends: .pyinstaller_build
  image: nvidia/cuda:12.8.1-runtime-ubuntu24.04
  tags: [linux, x86_64]
  before_script:
    - apt-get update && apt-get install -y python3 python3-pip python3-venv
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install -U pip setuptools wheel
    - pip install pyinstaller
    - pip install -e ".[cuda]"

package-windows-x86_64:
  extends: .pyinstaller_build
  tags: [windows, x86_64]
  before_script:
    - $env:Path = "D:\GitLab-Runner\venv\Scripts;C:\Program Files\Git\cmd;" + $env:Path
    - python -m venv .venv
    - .\.venv\Scripts\Activate.ps1
    - python -m pip install -U pip setuptools wheel
    - python -m pip install pyinstaller
    - python -m pip install -e ".[cuda]"
  script:
    - pyinstaller pyinstaller/quip_network_node.spec --distpath dist --workpath build/pyinstaller --clean
    - $binary = Get-ChildItem dist/quip-network-node-* | Select-Object -First 1
    - "& $($binary.FullName) --version"
  after_script:
    - |
      Get-ChildItem dist/quip-network-node-* | ForEach-Object {
        $filename = $_.Name
        Write-Host "Uploading $filename to Package Registry..."
        $url = "$env:CI_API_V4_URL/projects/$env:CI_PROJECT_ID/packages/generic/$env:PACKAGE_NAME/$env:PACKAGE_VERSION/$filename"
        Invoke-RestMethod -Uri $url -Method Put -InFile $_.FullName -Headers @{"JOB-TOKEN"=$env:CI_JOB_TOKEN}
      }

release-binaries:
  stage: release
  image: alpine:latest
  needs:
    - package-macos-arm64
    - package-macos-x86_64
    - package-linux-x86_64
    - package-windows-x86_64
  variables:
    PACKAGE_NAME: quip-network-node
    PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}"
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG"
    assets:
      links:
        - name: quip-network-node-macos-arm64
          url: "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/quip-network-node-macos-arm64"
          filepath: /quip-network-node-macos-arm64
        - name: quip-network-node-macos-x86_64
          url: "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/quip-network-node-macos-x86_64"
          filepath: /quip-network-node-macos-x86_64
        - name: quip-network-node-linux-x86_64
          url: "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/quip-network-node-linux-x86_64"
          filepath: /quip-network-node-linux-x86_64
        - name: quip-network-node-windows-x86_64.exe
          url: "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/quip-network-node-windows-x86_64.exe"
          filepath: /quip-network-node-windows-x86_64.exe

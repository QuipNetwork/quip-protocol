# GitLab CI/CD for Quip Network Node
# Tests on branches, builds + releases on main/tags

stages:
  - test
  - build
  - release

variables:
  CPU_IMAGE: quip-network-node-cpu
  CUDA_IMAGE: quip-network-node-cuda

# ---------------------------------------------------------------------------
# Tests (branches only — main/tags skip straight to build)
# ---------------------------------------------------------------------------

test:
  stage: test
  image: python:3.12-slim
  tags: [linux, amd64]
  before_script:
    - pip install -U pip setuptools wheel
    - pip install -e ".[dev]"
  script:
    - python -m pytest tests/ -v --ignore=tests/test_certificate_manager.py
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
      when: never
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Version-tag gate (tags only — fail fast if tag ≠ pyproject.toml version)
# ---------------------------------------------------------------------------

check-version:
  stage: test
  image: python:3.12-slim
  tags: [linux, amd64]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      PKG_VERSION=$(python3 -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "ERROR: tag $CI_COMMIT_TAG has version v${PKG_VERSION} in pyproject.toml (expected v${TAG_VERSION})"
        exit 1
      fi
      echo "OK: tag $CI_COMMIT_TAG matches pyproject.toml version $PKG_VERSION"

# ---------------------------------------------------------------------------
# Docker image builds (Kaniko — no daemon required)
# ---------------------------------------------------------------------------

.docker_build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags: [linux, amd64]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n ${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD} | base64)\"}}}" > /kaniko/.docker/config.json
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build-cpu:
  extends: .docker_build
  script:
    - /kaniko/executor
        --context $CI_PROJECT_DIR
        --dockerfile docker/Dockerfile.cpu
        --destination $CI_REGISTRY_IMAGE/$CPU_IMAGE:$CI_COMMIT_SHA
        --destination $CI_REGISTRY_IMAGE/$CPU_IMAGE:latest

build-cuda:
  extends: .docker_build
  script:
    - /kaniko/executor
        --context $CI_PROJECT_DIR
        --dockerfile docker/Dockerfile.cuda
        --destination $CI_REGISTRY_IMAGE/$CUDA_IMAGE:$CI_COMMIT_SHA
        --destination $CI_REGISTRY_IMAGE/$CUDA_IMAGE:latest

# ---------------------------------------------------------------------------
# PyInstaller native binaries
# ---------------------------------------------------------------------------

.pyinstaller_build:
  stage: build
  variables:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
  script:
    - bash pyinstaller/build.sh
  artifacts:
    paths:
      - dist/quip-network-node-*
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

package-macos-arm64:
  extends: .pyinstaller_build
  tags: [macos, arm64]
  before_script:
    - rm -rf .venv-arm64
    - /opt/homebrew/bin/python3.13 -m venv .venv-arm64
    - source .venv-arm64/bin/activate
    - pip install -U pip setuptools wheel
    - pip install pyinstaller
    - pip install -e ".[metal]"

package-macos-x86_64:
  extends: .pyinstaller_build
  tags: [macos, x86_64]
  before_script:
    - rm -rf .venv-x86_64
    - arch -x86_64 /usr/local/bin/python3.13 -m venv .venv-x86_64
    - source .venv-x86_64/bin/activate
    - pip install -U pip setuptools wheel
    - pip install pyinstaller
    - pip install -e .

# ---------------------------------------------------------------------------
# Release (tags only)
# ---------------------------------------------------------------------------

release-binaries:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  tags: [linux, amd64]
  needs:
    - package-macos-arm64
    - package-macos-x86_64
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG"
    assets:
      links:
        - name: quip-network-node-macos-arm64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/quip-network-node-macos-arm64?job=package-macos-arm64"
          filepath: /quip-network-node-macos-arm64
        - name: quip-network-node-macos-x86_64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/quip-network-node-macos-x86_64?job=package-macos-x86_64"
          filepath: /quip-network-node-macos-x86_64

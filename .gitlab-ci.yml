# GitLab CI/CD for Quip Network Node Docker Images
# Builds multi-arch (amd64 + arm64) Docker images and PyInstaller binaries

stages:
  - build
  - package

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  CPU_IMAGE: quip-network-node-cpu
  CUDA_IMAGE: quip-network-node-cuda

# Template for Docker buildx builds
.docker_build:
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - |
      docker context create ci-ctx \
        --docker "host=${DOCKER_HOST:-tcp://docker:2376},ca=${DOCKER_TLS_CERTDIR}/client/ca.pem,cert=${DOCKER_TLS_CERTDIR}/client/cert.pem,key=${DOCKER_TLS_CERTDIR}/client/key.pem"
    - docker buildx create --use --name multiarch-builder ci-ctx
    - docker buildx inspect --bootstrap

# Build and push CPU network node image (amd64 + arm64)
build-cpu:
  extends: .docker_build
  stage: build
  script:
    - docker buildx build --platform linux/amd64,linux/arm64
        -f docker/Dockerfile.cpu
        -t $CI_REGISTRY_IMAGE/$CPU_IMAGE:$CI_COMMIT_SHA
        -t $CI_REGISTRY_IMAGE/$CPU_IMAGE:latest
        --push .
  only:
    - main
    - tags
    - /^v\d+/

# Build and push CUDA network node image (amd64 + arm64)
build-cuda:
  extends: .docker_build
  stage: build
  script:
    - docker buildx build --platform linux/amd64,linux/arm64
        -f docker/Dockerfile.cuda
        -t $CI_REGISTRY_IMAGE/$CUDA_IMAGE:$CI_COMMIT_SHA
        -t $CI_REGISTRY_IMAGE/$CUDA_IMAGE:latest
        --push .
  only:
    - main
    - tags
    - /^v\d+/

# ---------------------------------------------------------------------------
# PyInstaller native binaries (package stage, tags only)
# ---------------------------------------------------------------------------

# Template for PyInstaller builds
.pyinstaller_build:
  stage: package
  variables:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
  script:
    - bash pyinstaller/build.sh
  artifacts:
    paths:
      - dist/quip-network-node-*
    expire_in: 30 days
  only:
    - tags
    - /^v\d+/

package-macos-arm64:
  extends: .pyinstaller_build
  tags: [macos, arm64]
  before_script:
    - python3.12 -m venv .venv
    - source .venv/bin/activate
    - pip install -U pip setuptools wheel
    - pip install pyinstaller
    - pip install -e ".[metal]"

package-macos-x86_64:
  extends: .pyinstaller_build
  tags: [macos, x86_64]
  before_script:
    - arch -x86_64 python3.12 -m venv .venv
    - source .venv/bin/activate
    - pip install -U pip setuptools wheel
    - pip install pyinstaller
    - pip install -e .

package-linux-x86_64:
  extends: .pyinstaller_build
  image: python:3.12-bookworm
  tags: [linux, x86_64]
  before_script:
    - pip install pyinstaller
    - pip install -e ".[cuda]"

package-windows-x86_64:
  extends: .pyinstaller_build
  tags: [windows, x86_64]
  before_script:
    - $env:Path = "C:\Program Files\Git\cmd;C:\Python312\Scripts;C:\Python312;$env:Path"
    - python -m venv .venv
    - .\.venv\Scripts\Activate.ps1
    - pip install -U pip setuptools wheel
    - pip install pyinstaller
    - pip install -e ".[cuda]"
  artifacts:
    paths:
      - dist/quip-network-node-*.exe
    expire_in: 30 days

release-binaries:
  stage: package
  needs:
    - package-macos-arm64
    - package-macos-x86_64
    - package-linux-x86_64
    - package-windows-x86_64
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Uploading binaries to release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG"
    assets:
      links:
        - name: quip-network-node-macos-arm64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/quip-network-node-macos-arm64?job=package-macos-arm64"
          filepath: /quip-network-node-macos-arm64
        - name: quip-network-node-macos-x86_64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/quip-network-node-macos-x86_64?job=package-macos-x86_64"
          filepath: /quip-network-node-macos-x86_64
        - name: quip-network-node-linux-x86_64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/quip-network-node-linux-x86_64?job=package-linux-x86_64"
          filepath: /quip-network-node-linux-x86_64
        - name: quip-network-node-windows-x86_64.exe
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/quip-network-node-windows-x86_64.exe?job=package-windows-x86_64"
          filepath: /quip-network-node-windows-x86_64.exe

---
# Akash SDL for CPU Mining with IPFS Upload
# Results automatically uploaded to IPFS when mining completes
version: "2.0"

services:
  cpu-miner:
    image: hub.docker.com/carback1/quip-protocol-cpu-miner:v0.0.1
    env:
      - MINING_DURATION=10m
      - DIFFICULTY_ENERGY=-14900
      - MIN_DIVERSITY=0.1
      - MIN_SOLUTIONS=5
      - TOPOLOGY_FILE=dwave_topologies/topologies/advantage2_system1_8.json.gz
      - AUTO_TERMINATE=true
      # IPFS Configuration (REQUIRED)
      - IPFS_NODE=https://carback-ipfs.ngrok.io
      - IPFS_API_KEY=1d9967cd226f8cd5bfd0efbcdca14c9fc1ed58078ff98916ce22c618ea3ef88c  # UPDATE THIS
      - IPFS_PIN=true  # Pin files to IPFS for permanent storage
      # Optional: S3 fallback
      # - S3_BUCKET=your-bucket-name
      # - AWS_ACCESS_KEY_ID=your-key-id
      # - AWS_SECRET_ACCESS_KEY=your-secret-key
    expose:
      - port: 8080
        as: 80
        to:
          - global: true
        accept:
          - webdis

profiles:
  compute:
    cpu-miner:
      resources:
        cpu:
          units: 4  # 4 vCPUs
        memory:
          size: 8Gi
        storage:
          size: 20Gi
  placement:
    akash:
      attributes:
        host: akash
      signedBy:
        anyOf:
          - "akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63"
      pricing:
        cpu-miner:
          denom: uakt
          amount: 1000

deployment:
  cpu-miner:
    akash:
      profile: cpu-miner
      count: 1

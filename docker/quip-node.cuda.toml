# Quip Network Node - CUDA Mode Configuration (NVIDIA GPU)
# Copied to /data/config.toml on first run

[global]
secret = "GENERATE_ON_FIRST_RUN"
listen = "::"
port = 20049
# public_host = ""
# public_port = 20049
# node_name = ""
# auto_mine = false
# peer = []
timeout = 3
heartbeat_interval = 15
heartbeat_timeout = 300
verify_tls = false

# TLS certificates (injected by certbot in entrypoint.sh)
# tls_cert_file = "/data/certs/private/fullchain.pem"
# tls_key_file = "/data/certs/private/privkey.pem"

# TOFU
tofu = true
trust_db = "/data/trust.db"

# REST API
rest_host = "0.0.0.0"
rest_port = -1
rest_insecure_port = -1

# Logging
log_level = "INFO"

[gpu]
# CUDA GPU mining configuration
# Global defaults for all GPUs
# utilization = 100  # 1-100, percentage of SMs to use
# yielding = false   # true = yield to other GPU users (NVML)

# Device sections ([cuda.0], [cuda.1], ...) are auto-generated
# by entrypoint.sh if not already present in /data/config.toml
# Override by adding sections here or in /data/config.toml:
# [cuda.0]
#
# [cuda.1]
# utilization = 50
# yielding = true

# Quip Network Node - CPU Mode Configuration
# Copied to /data/config.toml on first run

[global]
secret = "GENERATE_ON_FIRST_RUN"
listen = "::"
port = 20049
# public_host = ""
# public_port = 20049
# node_name = ""
# auto_mine = false
# peer = []
timeout = 3
heartbeat_interval = 15
heartbeat_timeout = 300
verify_ssl = true

[tofu]
enabled = true
trust_db = "/data/trust.db"

[rest_api]
enabled = false
host = "0.0.0.0"
http_port = 8080
cert_dir = "/data/certs"

[cpu]
# num_cpus is auto-set by entrypoint.sh if not already configured

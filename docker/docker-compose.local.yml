# Local 3-node CPU network with REST API enabled for telemetry testing
#
# Build & run:
#   docker compose -f docker/docker-compose.local.yml up --build
#
# REST API endpoints (HTTP):
#   Node 1 (bootstrap): http://localhost:20050
#   Node 2:             http://localhost:20051
#   Node 3:             http://localhost:20052
#
# Test telemetry:
#   bash docker/test-rest-telemetry.sh

services:
  cpu-bootstrap:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    image: quip-network-node-cpu:local
    container_name: quip-local-bootstrap
    environment:
      - QUIP_PUBLIC_HOST=cpu-bootstrap
      - QUIP_NODE_NAME=local-bootstrap
      - QUIP_AUTO_MINE=true
      - QUIP_PEERS=
      - QUIP_REST_INSECURE_PORT=20050
      - QUIP_REST_HOST=0.0.0.0
      - CERT_EMAIL=
    volumes:
      - local-bootstrap-data:/data
    ports:
      - "20049:20049/udp"
      - "20049:20049/tcp"
      - "20050:20050/tcp"
    networks:
      - quip-local-net

  cpu-node-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    image: quip-network-node-cpu:local
    container_name: quip-local-node-2
    environment:
      - QUIP_PUBLIC_HOST=cpu-node-2
      - QUIP_NODE_NAME=local-node-2
      - QUIP_PEERS=cpu-bootstrap:20049
      - QUIP_AUTO_MINE=true
      - QUIP_REST_INSECURE_PORT=20050
      - QUIP_REST_HOST=0.0.0.0
    volumes:
      - local-node-2-data:/data
    depends_on:
      - cpu-bootstrap
    ports:
      - "20051:20050/tcp"
    networks:
      - quip-local-net

  cpu-node-3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    image: quip-network-node-cpu:local
    container_name: quip-local-node-3
    environment:
      - QUIP_PUBLIC_HOST=cpu-node-3
      - QUIP_NODE_NAME=local-node-3
      - QUIP_PEERS=cpu-bootstrap:20049
      - QUIP_AUTO_MINE=true
      - QUIP_REST_INSECURE_PORT=20050
      - QUIP_REST_HOST=0.0.0.0
    volumes:
      - local-node-3-data:/data
    depends_on:
      - cpu-bootstrap
    ports:
      - "20052:20050/tcp"
    networks:
      - quip-local-net

networks:
  quip-local-net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.29.0.0/16
        - subnet: fd00:dead:cafe::/64

volumes:
  local-bootstrap-data:
  local-node-2-data:
  local-node-3-data:

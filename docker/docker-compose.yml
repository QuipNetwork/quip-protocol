version: '3.8'

# Docker Compose for Quip Network Node testing
# Run: docker-compose up cpu-bootstrap cpu-node-2
#
# Config philosophy: TOML is the source of truth.
# ENV vars here override TOML only when non-empty.
# Port/listen/auto_mine defaults are in the TOML template.

services:
  # Bootstrap CPU node (first node, no external peers needed)
  cpu-bootstrap:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    image: carback1/quip-network-node-cpu:latest
    container_name: quip-cpu-bootstrap
    environment:
      - QUIP_PUBLIC_HOST=cpu-bootstrap
      - QUIP_NODE_NAME=cpu-bootstrap
      - QUIP_AUTO_MINE=true
      - QUIP_PEERS=
      - CERT_EMAIL=
    volumes:
      - cpu-bootstrap-data:/data
    ports:
      - "20049:20049/udp"
      - "20049:20049/tcp"
      - "80:80/tcp"
    networks:
      - quip-net

  # Second CPU node (joins bootstrap)
  cpu-node-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    image: carback1/quip-network-node-cpu:latest
    container_name: quip-cpu-2
    environment:
      - QUIP_PUBLIC_HOST=cpu-node-2
      - QUIP_NODE_NAME=cpu-node-2
      - QUIP_PEERS=cpu-bootstrap:20049
      - QUIP_AUTO_MINE=true
    volumes:
      - cpu-node-2-data:/data
    depends_on:
      - cpu-bootstrap
    networks:
      - quip-net

  # GPU node (requires NVIDIA runtime)
  gpu-node:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cuda
    image: carback1/quip-network-node-cuda:latest
    container_name: quip-gpu-1
    environment:
      - QUIP_PUBLIC_HOST=gpu-node
      - QUIP_NODE_NAME=gpu-node-1
      - QUIP_PEERS=cpu-bootstrap:20049
      - QUIP_AUTO_MINE=true
    volumes:
      - gpu-node-data:/data
    depends_on:
      - cpu-bootstrap
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - quip-net

networks:
  quip-net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
        - subnet: fd00:dead:beef::/64

volumes:
  cpu-bootstrap-data:
  cpu-node-2-data:
  gpu-node-data:

version: '3.8'

# Docker Compose for Quip Network Node testing
# Run: docker-compose up cpu-bootstrap cpu-node-2

services:
  # Bootstrap CPU node (first node, no external peers needed)
  cpu-bootstrap:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    image: carback1/quip-network-node-cpu:latest
    container_name: quip-cpu-bootstrap
    environment:
      - QUIP_PORT=20049
      - QUIP_LISTEN=0.0.0.0
      - QUIP_PUBLIC_HOST=cpu-bootstrap:20049
      - QUIP_NODE_NAME=cpu-bootstrap
      - QUIP_AUTO_MINE=true
      - QUIP_PEERS=
    volumes:
      - cpu-bootstrap-data:/data
    ports:
      - "20049:20049/udp"
      - "20049:20049/tcp"
    networks:
      - quip-net

  # Second CPU node (joins bootstrap)
  cpu-node-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    image: carback1/quip-network-node-cpu:latest
    container_name: quip-cpu-2
    environment:
      - QUIP_PORT=20049
      - QUIP_LISTEN=0.0.0.0
      - QUIP_PUBLIC_HOST=cpu-node-2:20049
      - QUIP_NODE_NAME=cpu-node-2
      - QUIP_PEERS=cpu-bootstrap:20049
      - QUIP_AUTO_MINE=true
    volumes:
      - cpu-node-2-data:/data
    depends_on:
      - cpu-bootstrap
    networks:
      - quip-net

  # GPU node (requires NVIDIA runtime)
  gpu-node:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cuda
    image: carback1/quip-network-node-cuda:latest
    container_name: quip-gpu-1
    environment:
      - QUIP_PORT=20049
      - QUIP_LISTEN=0.0.0.0
      - QUIP_PUBLIC_HOST=gpu-node:20049
      - QUIP_NODE_NAME=gpu-node-1
      - QUIP_PEERS=cpu-bootstrap:20049
      - QUIP_AUTO_MINE=true
    volumes:
      - gpu-node-data:/data
    depends_on:
      - cpu-bootstrap
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - quip-net

networks:
  quip-net:
    driver: bridge

volumes:
  cpu-bootstrap-data:
  cpu-node-2-data:
  gpu-node-data:

version: '3.8'

services:
  # CPU miner service
  cpu-miner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    image: quip-protocol/cpu-miner:latest
    container_name: quip-cpu-miner
    environment:
      - MINING_DURATION=${MINING_DURATION:-30m}
      - DIFFICULTY_ENERGY=${DIFFICULTY_ENERGY:--14900}
      - MIN_DIVERSITY=${MIN_DIVERSITY:-0.1}
      - MIN_SOLUTIONS=${MIN_SOLUTIONS:-5}
      - TOPOLOGY_FILE=${TOPOLOGY_FILE:-dwave_topologies/topologies/advantage2_system1_7.json.gz}
      - S3_BUCKET=${S3_BUCKET:-}
    volumes:
      - ./output:/output
      - ../dwave_topologies:/app/dwave_topologies:ro
    restart: "no"
    networks:
      - quip-network

  # CUDA miner service (requires NVIDIA GPU)
  cuda-miner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cuda
    image: quip-protocol/cuda-miner:latest
    container_name: quip-cuda-miner
    environment:
      - MINING_DURATION=${MINING_DURATION:-30m}
      - DIFFICULTY_ENERGY=${DIFFICULTY_ENERGY:--14900}
      - MIN_DIVERSITY=${MIN_DIVERSITY:-0.1}
      - MIN_SOLUTIONS=${MIN_SOLUTIONS:-5}
      - TOPOLOGY_FILE=${TOPOLOGY_FILE:-dwave_topologies/topologies/advantage2_system1_7.json.gz}
      - GPU_DEVICE=${GPU_DEVICE:-0}
      - S3_BUCKET=${S3_BUCKET:-}
    volumes:
      - ./output:/output
      - ../dwave_topologies:/app/dwave_topologies:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: "no"
    networks:
      - quip-network

networks:
  quip-network:
    driver: bridge

volumes:
  output:
    driver: local
